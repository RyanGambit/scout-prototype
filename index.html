<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCOUT | Retrofit Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar for Chat */
      .scout-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .scout-scroll::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      .scout-scroll::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      .scout-scroll::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      
      /* Markdown Styles - Strict Hierarchy */
      .prose {
        color: #334155; /* slate-700 */
        font-size: 0.925rem;
        line-height: 1.6;
      }
      .prose h1 { 
        font-size: 1.75rem; /* 28px */
        font-weight: 800;
        color: #0f172a; /* slate-900 */
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #e2e8f0;
        margin-top: 0;
      }
      .prose h2 { 
        font-size: 1.35rem; /* 22px */
        font-weight: 700;
        color: #1e293b; /* slate-800 */
        margin-top: 2rem;
        margin-bottom: 0.75rem;
      }
      .prose h3 { 
        font-size: 1.1rem; /* 18px */
        font-weight: 600;
        color: #334155; /* slate-700 */
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .prose p { 
        margin-bottom: 1rem;
      }
      .prose ul { 
        list-style-type: disc;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      .prose ol { 
        list-style-type: decimal;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      .prose li { 
        margin-bottom: 0.25rem;
      }
      .prose strong { 
        font-weight: 700;
        color: #0f172a;
      }
      .prose table {
        width: 100%;
        font-size: 0.875rem;
        margin-top: 1.5rem;
        margin-bottom: 1.5rem;
        border-collapse: collapse;
        border: 1px solid #e2e8f0;
      }
      .prose thead {
         background-color: #f8fafc;
         border-bottom: 2px solid #e2e8f0;
      }
      .prose th {
        padding: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: #475569;
        text-align: left;
      }
      .prose tbody tr {
        border-bottom: 1px solid #f1f5f9;
      }
      .prose tbody tr:last-child {
        border-bottom: none;
      }
      .prose td {
        padding: 0.75rem;
        color: #334155;
      }
      .prose blockquote {
        border-left: 4px solid #10b981;
        padding-left: 1rem;
        font-style: italic;
        background-color: #f0fdf4;
        padding-top: 0.5rem;
        padding-bottom: 0.5rem;
        margin-top: 1rem;
        margin-bottom: 1rem;
        border-radius: 0 0.375rem 0.375rem 0;
      }

      /* Animation for Savings Text */
      @keyframes fadeInGreen {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeInGreen {
        animation: fadeInGreen 0.5s ease-out forwards;
      }
      .animate-fadeIn {
        animation: fadeInGreen 0.3s ease-out forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1",
    "remark-gfm": "https://esm.sh/remark-gfm@4.0.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
